        e.target.tagName, String(e.target.src || e.target.href || ''));

    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).

    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.

      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.

    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down

      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }

    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }

      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;

        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }

        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'

        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.

    setStatus('Unpacking ' + uuids.length + ' assets...');

          return;
        }

            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });

        console.error('Failed to decode asset ' + uuid + ':', err);

    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {

    }

    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.

      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';

    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

#0a0a0b;color:#e9e6df;font-family:'Archivo',system-ui,sans-serif}\nbody{overflow-x:hidden}\na{color:#d9d6cf;text-decoration-color:rgba(217,214,207,0.4)}\na:hover{color:#5fc8ec}\n::selection{background:rgba(63,182,224,0.25)}\n@keyframes syn-pulse{0%,100%{opacity:0.65}50%{opacity:0.12}}\n<\u002Fstyle>\n<\u002Fhelmet>\n<canvas id=\"syn-field\" style=\"position:fixed;inset:0;width:100%;height:100%;display:block;z-index:0\"><\u002Fcanvas>\n<main style=\"position:relative;z-index:1\">\n  <section data-zone=\"0\" data-screen-label=\"Z0 Entry\" style=\"position:relative;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:26px;padding:0 4vw;box-sizing:border-box\">\n    <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.22em;color:#8a877f\">INDEPENDENT DEEP TECHNOLOGY — EUROPE<\u002Fdiv>\n    <div id=\"wordmark\" aria-hidden=\"true\" style=\"margin:0;font-size:clamp(64px,14.5vw,290px);line-height:0.92;letter-spacing:-0.015em;color:#f2efe8;font-variation-settings:'wght' 620, 'wdth' 88;text-align:center\">SYNORA<\u002Fdiv>\n    <h1 style=\"margin:0;font-family:'Archivo',system-ui,sans-serif;font-weight:400;font-size:15px;color:#a5a29a;letter-spacing:0.02em;text-align:center;text-wrap:pretty\">A different species of artificial intelligence.<\u002Fh1>\n    <p style=\"margin:0;font-size:12.5px;color:#807d76;letter-spacing:0.03em;text-align:center;text-wrap:pretty;max-width:520px\">Weightless autonomous intelligence, built beyond the assumptions of large language models.<\u002Fp>\n    <div style=\"position:absolute;bottom:56px;left:50%;transform:translateX(-50%);font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.18em;color:#6d6a63;animation:syn-pulse 3.2s ease-in-out infinite;white-space:nowrap\">SCROLL — ENTER THE FIELD<\u002Fdiv>\n  <\u002Fsection>\n  <section data-zone=\"1\" data-screen-label=\"Z1 Thesis\" style=\"min-height:130vh;display:flex;align-items:center;padding:0 8vw;box-sizing:border-box\">\n    <div style=\"max-width:540px;background:rgba(11,11,12,0.68);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border:1px solid rgba(235,232,225,0.1);padding:34px 38px\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.18em;color:#8a877f\">00 / THESIS<\u002Fdiv>\n      <h2 style=\"margin:16px 0 14px;font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:clamp(26px,2.6vw,38px);line-height:1.12;color:#f0ede6;letter-spacing:-0.01em\">Not another model.<\u002Fh2>\n      <p style=\"margin:0 0 12px;font-size:15px;line-height:1.6;color:#aeaba3;text-wrap:pretty\">SYNORA is building artificial intelligence beyond the assumptions of LLMs — from original theory, native computation and extreme-performance code.<\u002Fp>\n      <p style=\"margin:0 0 18px;font-size:15px;line-height:1.6;color:#aeaba3;text-wrap:pretty\">The machinery already exists. Now its parts are becoming one.<\u002Fp>\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.14em;color:#6d6a63\">THE WORK PRECEDES THE STORY<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n  <section data-zone=\"2\" data-screen-label=\"Z2 The Field\" style=\"min-height:520vh;position:relative\">\n    <div id=\"z2-head\" style=\"position:sticky;top:7vh;padding:0 8vw;max-width:520px;box-sizing:border-box\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.18em;color:#8a877f\">01 / THE FIELD<\u002Fdiv>\n      <h2 style=\"margin:14px 0 10px;font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:clamp(24px,2.4vw,34px);line-height:1.14;color:#f0ede6\">Eleven signals. One machine.<\u002Fh2>\n      <p style=\"margin:0 0 10px;font-size:14px;line-height:1.6;color:#a19e96;max-width:420px;text-wrap:pretty\">Move through the forces shaping the work — from origin and structure to inference, autonomy and emergence.<\u002Fp>\n      <p style=\"margin:0;font-size:14px;line-height:1.6;color:#a19e96;max-width:420px;text-wrap:pretty\">The field is not a product catalogue. It is a glimpse into the intelligence taking form behind Synora.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n  <section data-zone=\"3\" data-screen-label=\"Z3 Convergence\" style=\"min-height:220vh;position:relative\">\n    <div style=\"position:sticky;top:14vh;display:flex;flex-direction:column;gap:8vh\">\n      <div id=\"divider-word\" style=\"font-size:17vw;line-height:0.9;font-variation-settings:'wght' 760, 'wdth' 62;color:rgba(242,239,232,0.14);white-space:nowrap;overflow:hidden;text-align:center;letter-spacing:-0.01em\">SYNORA<\u002Fdiv>\n      <div style=\"max-width:460px;margin-left:auto;margin-right:8vw;background:rgba(11,11,12,0.68);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border:1px solid rgba(235,232,225,0.1);padding:28px 32px\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.18em;color:#8a877f\">02 / CONVERGENCE<\u002Fdiv>\n        <h2 style=\"margin:14px 0 12px;font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:clamp(24px,2.4vw,34px);line-height:1.14;color:#f0ede6\">The pieces found each other.<\u002Fh2>\n        <p style=\"margin:0 0 10px;font-size:14px;line-height:1.6;color:#aeaba3;text-wrap:pretty\">An extreme-speed engine led to a wider intelligence system.<\u002Fp>\n        <p style=\"margin:0 0 10px;font-size:14px;line-height:1.6;color:#aeaba3;text-wrap:pretty\">That system demanded a deeper theory.<\u002Fp>\n        <p style=\"margin:0 0 10px;font-size:14px;line-height:1.6;color:#aeaba3;text-wrap:pretty\">The theory demanded a new computational body.<\u002Fp>\n        <p style=\"margin:0;font-size:14px;line-height:1.6;color:#aeaba3;text-wrap:pretty\">What looked scattered was causal. What looked separate was one machine arriving from different directions.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n  <section data-zone=\"4\" data-screen-label=\"Z4 Built\" style=\"min-height:150vh;display:flex;flex-direction:column;justify-content:center;gap:5vh;padding:0 6vw;box-sizing:border-box\">\n    <div style=\"max-width:560px\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.18em;color:#8a877f\">03 / BUILT<\u002Fdiv>\n      <h2 style=\"margin:14px 0 0;font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:clamp(24px,2.4vw,34px);line-height:1.14;color:#f0ede6\">The machinery already exists.<\u002Fh2>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:18px;max-width:1180px\">\n      <div style=\"background:rgba(11,11,12,0.68);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border:1px solid rgba(235,232,225,0.1);padding:24px 26px\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.14em;color:#6d6a63\">THEORY → ARCHITECTURE<\u002Fdiv>\n        <h3 style=\"margin:12px 0 8px;font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:17px;line-height:1.25;color:#ece9e2\">Original foundations<\u002Fh3>\n        <p style=\"margin:0;font-size:13px;line-height:1.55;color:#a19e96;text-wrap:pretty\">Not a brand story constructed after the fact. A serious theoretical programme that forced a different architecture of intelligence into existence.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:rgba(11,11,12,0.68);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border:1px solid rgba(235,232,225,0.1);padding:24px 26px\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.14em;color:#6d6a63\">CODE → INFERENCE<\u002Fdiv>\n        <h3 style=\"margin:12px 0 8px;font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:17px;line-height:1.25;color:#ece9e2\">Working machinery<\u002Fh3>\n        <p style=\"margin:0;font-size:13px;line-height:1.55;color:#a19e96;text-wrap:pretty\">Substantial kernels, engines and low-level systems developed through years of direct engineering — including an operational extreme-speed lineage.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:rgba(11,11,12,0.68);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border:1px solid rgba(235,232,225,0.1);padding:24px 26px\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.14em;color:#6d6a63\">PARTS → WHOLE<\u002Fdiv>\n        <h3 style=\"margin:12px 0 8px;font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:17px;line-height:1.25;color:#ece9e2\">Active convergence<\u002Fh3>\n        <p style=\"margin:0;font-size:13px;line-height:1.55;color:#a19e96;text-wrap:pretty\">The existing technologies are now being integrated, optimized and driven toward their first unified public demonstration.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n  <section data-zone=\"5\" data-screen-label=\"Z5 Contact\" style=\"min-height:100vh;display:flex;flex-direction:column;justify-content:flex-end;padding:0 4vw 5vh;box-sizing:border-box;gap:5vh\">\n    <div style=\"font-size:13.5vw;line-height:0.85;font-variation-settings:'wght' 860, 'wdth' 116;color:#f2efe8;text-align:center;letter-spacing:-0.015em\">SYNORA<\u002Fdiv>\n    <div style=\"display:flex;flex-wrap:wrap;justify-content:space-between;gap:14px 28px;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.14em;color:#6d6a63;border-top:1px solid rgba(235,232,225,0.09);padding-top:18px\">\n      <span>SYNORA LABS — SYNORA GROUP LTD · EUROPE<\u002Fspan>\n      <span>INDEPENDENT DEEP TECHNOLOGY<\u002Fspan>\n      <a href=\"mailto:contacts@synoralabs.eu\" style=\"font-family:'JetBrains Mono',monospace\">contacts@synoralabs.eu<\u002Fa>\n      <a href=\"https://www.linkedin.com/company/synoralabs\" style=\"font-family:'JetBrains Mono',monospace\">LINKEDIN<\u002Fa>\n      <a href=\"https://github.com/Synora-Group\" style=\"font-family:'JetBrains Mono',monospace\">GITHUB<\u002Fa>\n      <a href=\"https://synoragroup.eu\" style=\"font-family:'JetBrains Mono',monospace\">SYNORA GROUP<\u002Fa>\n      <span>FIELD / 2026<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n<\u002Fmain>\n<div style=\"position:fixed;inset:0;z-index:2;pointer-events:none;overflow:hidden\">\n  <sc-for list=\"{{ nodes }}\" as=\"node\" hint-placeholder-count=\"11\">\n    <div data-node-label=\"{{ node.i }}\" style=\"position:absolute;left:0;top:0;opacity:0;display:flex;align-items:center;gap:8px;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.08em;color:#cdcac3;white-space:nowrap;will-change:transform;pointer-events:auto;cursor:pointer\">\n      <span style=\"color:#7a776f\">{{ node.id }}<\u002Fspan><span>{{ node.name }}<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsc-for>\n<\u002Fdiv>\n<div style=\"position:fixed;inset:0;z-index:3;pointer-events:none;overflow:hidden\">\n  <sc-for list=\"{{ nodes }}\" as=\"node\" hint-placeholder-count=\"11\">\n    <div data-card=\"{{ node.i }}\" style=\"position:absolute;left:0;top:0;width:min(348px,calc(100vw - 28px));opacity:0;pointer-events:none;transform-origin:0 46px;background:rgba(11,11,12,0.72);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border:1px solid rgba(235,232,225,0.12);padding:18px 20px;will-change:transform;box-sizing:border-box;cursor:pointer\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.14em;color:#6d6a63\">{{ node.id }} · {{ node.cat }}<\u002Fdiv>\n      <h3 style=\"margin:10px 0 8px;font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:17px;line-height:1.25;color:#ece9e2\">{{ node.title }}<\u002Fh3>\n      <p style=\"margin:0;font-size:13px;line-height:1.55;color:#a9a69f;text-wrap:pretty\">{{ node.summary }}<\u002Fp>\n      <div data-dossier=\"{{ node.i }}\" style=\"max-height:0;opacity:0;overflow:hidden;transition:max-height 0.45s ease, opacity 0.35s ease\">\n        <p style=\"margin:14px 0 12px;font-size:12.5px;line-height:1.55;color:#8f8c85;text-wrap:pretty\">{{ node.dossier }}<\u002Fp>\n        <div style=\"display:grid;grid-template-columns:58px 1fr;gap:4px 14px;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.1em;color:#8a877f;border-top:1px solid rgba(235,232,225,0.09);padding-top:10px\">\n          <span style=\"color:#5c5a54\">SOURCE<\u002Fspan><span>{{ node.source }}<\u002Fspan>\n          <span style=\"color:#5c5a54\">STATE<\u002Fspan><span>{{ node.state }}<\u002Fspan>\n          <span style=\"color:#5c5a54\">VECTOR<\u002Fspan><span>{{ node.vector }}<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div data-hint=\"{{ node.i }}\" style=\"margin-top:12px;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:0.16em;color:#6d6a63\">* DOSSIER<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-for>\n<\u002Fdiv>\n<div id=\"hud\" style=\"position:fixed;inset:0;z-index:4;pointer-events:none;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.12em;color:#6d6a63;text-transform:uppercase\">\n  <div style=\"position:absolute;top:16px;left:18px;display:flex;gap:20px\"><span style=\"color:#a5a29a\">SYNORA<\u002Fspan><span>PUBLIC FIELD<\u002Fspan><span>EUROPE / 2026<\u002Fspan><\u002Fdiv>\n  <div style=\"position:absolute;top:16px;right:18px;display:flex;flex-direction:column;gap:5px;text-align:right\">\n    <div data-hud-zone=\"0\">Z0 ENTRY<\u002Fdiv>\n    <div data-hud-zone=\"1\">Z1 THESIS<\u002Fdiv>\n    <div data-hud-zone=\"2\">Z2 FIELD<\u002Fdiv>\n    <div data-hud-zone=\"3\">Z3 CONVERGENCE<\u002Fdiv>\n    <div data-hud-zone=\"4\">Z4 BUILT<\u002Fdiv>\n    <div data-hud-zone=\"5\">Z5 CONTACT<\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"position:absolute;bottom:16px;left:18px;display:flex;flex-direction:column;gap:5px\">\n    <div id=\"hud-cam\">CAM +0.0 / +7.0 / +15.5<\u002Fdiv>\n    <div id=\"hud-load\">FIELD LOAD 0.00<\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"position:absolute;bottom:16px;right:18px;display:flex;align-items:center;gap:10px\">\n    <div id=\"hud-p\">P 0.000<\u002Fdiv>\n    <div style=\"width:120px;height:1px;background:rgba(233,230,223,0.15)\"><div id=\"hud-bar\" style=\"width:0;height:1px;background:rgba(233,230,223,0.7)\"><\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;fieldHue&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;ember&quot;,&quot;ion&quot;,&quot;signal&quot;],&quot;default&quot;:&quot;ion&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Field&quot;},&quot;fieldEnergy&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;min&quot;:0.3,&quot;max&quot;:1.8,&quot;step&quot;:0.05,&quot;default&quot;:1.2,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Field&quot;},&quot;showHud&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Instrument layer&quot;}}\">\nclass Component extends DCLogic {\n  nodes = [\n    {i:0,id:'S/01',name:'ORIGIN',title:'Origin',cat:'FIRST PRINCIPLES',x:-8.5,z:-4.5,summary:'We do not begin with the model. We begin with intelligence itself.',dossier:'The work starts below the familiar AI stack: with original theory, new computational forms and the question of what intelligence can become when language is no longer its foundation.',source:'THEORY · ENGINEERING',state:'FOUNDATIONAL',vector:'BEYOND MODELS'},\n    {i:1,id:'S/02',name:'FORM',title:'Form',cat:'INNER ARCHITECTURE',x:-5.5,z:2.5,summary:'Intelligence needs an architecture, not merely more scale.',dossier:'Synora approaches intelligence from the inside out. Its shape, relations and internal movement are designed deliberately rather than expected to emerge from parameter count alone.',source:'STRUCTURE · THEORY',state:'ACTIVE',vector:'NATIVE INTELLIGENCE'},\n    {i:2,id:'S/03',name:'BODY',title:'Body',cat:'NATIVE COMPUTATION',x:-3,z:-2,summary:'A new intelligence needs its own computational body.',dossier:'The architecture cannot remain an idea. It requires kernels, state machinery, memory structures and execution paths built specifically for the intelligence they are intended to carry.',source:'KERNEL · SYSTEMS',state:'PROTOTYPED',vector:'PHYSICAL COMPUTATION'},\n    {i:3,id:'S/04',name:'STATE',title:'State',cat:'CONTINUOUS EXISTENCE',x:-0.5,z:3,summary:'The machine should inhabit a living state, not a temporary context.',dossier:'Not another isolated prompt. Not another transient session. The system is being built around an internal computational condition through which it can change, persist and act.',source:'STATE · KERNEL',state:'ACTIVE',vector:'CONTINUITY'},\n    {i:4,id:'S/05',name:'MEMORY',title:'Memory',cat:'INTERNAL PERSISTENCE',x:0.5,z:-4.8,summary:'Memory belongs inside the intelligence, not beside it.',dossier:'Synora is exploring memory as part of the machine\\u2019s own structure rather than an external archive attached after the intelligence has already been built.',source:'MEMORY · IDENTITY',state:'ACTIVE',vector:'PERSISTENCE'},\n    {i:5,id:'S/06',name:'INFERENCE',title:'Inference',cat:'DECISION MACHINERY',x:2.8,z:0.5,summary:'A system becomes intelligent when it can decide, not merely generate.',dossier:'Our inference lineage began in environments where hesitation carries a cost. That pressure produced working machinery built for speed, consequence and live intervention.',source:'INFERENCE · DECISION',state:'WORKING LINEAGE',vector:'EXTREME SPEED'},\n    {i:6,id:'S/07',name:'VELOCITY',title:'Velocity',cat:'MECHANICAL FLOOR',x:4.5,z:-3.2,summary:'Push state, decision and action closer to the machine.',dossier:'The objective is not simply faster software. It is to remove unnecessary distance between perception, internal state, inference and action.',source:'PERFORMANCE · SYSTEMS',state:'BENCHMARKING',vector:'MECHANICAL FLOOR'},\n    {i:7,id:'S/08',name:'LINK',title:'Link',cat:'EXTERNAL INTELLIGENCE',x:6,z:2.8,summary:'Models, tools and data become instruments — not foundations.',dossier:'Language models, semantic engines, knowledge systems and external technologies can be reached and used without becoming the core intelligence itself.',source:'SEMANTICS · INTERFACE',state:'ACTIVE',vector:'OPEN SYSTEMS'},\n    {i:8,id:'S/09',name:'AUTONOMY',title:'Autonomy',cat:'BEYOND THE SCREEN',x:7.5,z:-1,summary:'Intelligence must be able to leave the interface.',dossier:'The architecture is being developed to enter machines, networks and environments where intelligence becomes behaviour and decisions produce physical consequences.',source:'CONTROL · EMBODIMENT',state:'EXPLORATORY',vector:'PHYSICAL SYSTEMS'},\n    {i:9,id:'S/10',name:'MULTIPLICITY',title:'Multiplicity',cat:'DISTRIBUTED FORM',x:9,z:4,summary:'One intelligence can become many without losing its form.',dossier:'Synora is investigating how multiple systems can share structure, coordinate and evolve without collapsing into one conventional central controller.',source:'DISTRIBUTION · SWARMS',state:'RESEARCH',vector:'COLLECTIVE INTELLIGENCE'},\n    {i:10,id:'S/11',name:'EMERGENCE',title:'Emergence',cat:'CONVERGENCE',x:10.5,z:-4,summary:'The whole was hidden inside the pieces.',dossier:'Theory, kernels, inference engines and semantic systems were developed from different directions. They are now resolving into one larger intelligence.',source:'THE COMPLETE PROGRAMME',state:'HAPPENING NOW',vector:'SYNORA'}\n  ];\n  renderVals(){ return { nodes: this.nodes }; }\n  componentDidMount(){\n    const cv = document.getElementById('syn-field');\n    if(!cv) return;\n    this.cv = cv; this.ctx = cv.getContext('2d');\n    this.nodeScreen = new Array(this.nodes.length).fill(null);\n    this.sorted = [...this.nodes].sort((a,b)=>a.x-b.x);\n    this.reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;\n    this.t0 = performance.now();\n    this.fc = 0; this.open = -1; this.Esm = 0.5; this.lastP = -1; this.lastOpen = -2;\n    this.act = new Float32Array(this.nodes.length);\n    this.mx = -1; this.my = -1;\n    this.els = {\n      word: document.getElementById('wordmark'),\n      div: document.getElementById('divider-word'),\n      hud: document.getElementById('hud'),\n      cam: document.getElementById('hud-cam'),\n      load: document.getElementById('hud-load'),\n      pv: document.getElementById('hud-p'),\n      bar: document.getElementById('hud-bar'),\n      z2head: document.getElementById('z2-head'),\n      zoneEls: [...document.querySelectorAll('[data-hud-zone]')],\n      labels: [...document.querySelectorAll('[data-node-label]')],\n      cards: [...document.querySelectorAll('[data-card]')],\n      zones: [...document.querySelectorAll('[data-zone]')]\n    };\n    this.els.cards.forEach((el,k)=>{\n      el.setAttribute('role','button');\n      el.setAttribute('aria-label', this.nodes[k].id + ' ' + this.nodes[k].title + ' — open dossier');\n      el.addEventListener('click', ev=>{ ev.stopPropagation(); this.toggleCard(k); });\n      el.addEventListener('keydown', ev=>{\n        if(ev.key === 'Enter' || ev.key === ' '){ ev.preventDefault(); ev.stopPropagation(); this.toggleCard(k); }\n      });\n    });\n    this.els.labels.forEach((el,k)=>{\n      el.addEventListener('click', ev=>{ ev.stopPropagation(); this.travel(k); });\n    });\n    this.onDocClick = ev=>{\n      if(ev.target.closest('a,[data-card],[data-node-label]')) return;\n      if(this.labOp < 0.3) return;\n      for(let k=0;k<this.nodeScreen.length;k++){\n        const q = this.nodeScreen[k];\n        if(q && Math.hypot(q[0]-ev.clientX, q[1]-ev.clientY) < 22){ this.travel(k); return; }\n      }\n    };\n    this.onMove = ev=>{ this.mx = ev.clientX; this.my = ev.clientY; };\n    this.onKey = ev=>{ if(ev.key === 'Escape' && this.open >= 0) this.toggleCard(this.open); };\n    document.addEventListener('click', this.onDocClick);\n    document.addEventListener('mousemove', this.onMove, {passive:true});\n    document.addEventListener('keydown', this.onKey);\n    this.measure();\n    window.addEventListener('resize', this.measure);\n    setTimeout(this.measure, 700);\n    if(document.fonts && document.fonts.ready) document.fonts.ready.then(()=>this.measure());\n    this.raf = requestAnimationFrame(this.frame);\n  }\n  componentWillUnmount(){\n    cancelAnimationFrame(this.raf);\n    window.removeEventListener('resize', this.measure);\n    document.removeEventListener('click', this.onDocClick);\n    document.removeEventListener('mousemove', this.onMove);\n    document.removeEventListener('keydown', this.onKey);\n  }\n  travel(k){\n    if(this.cardC && this.sh) window.scrollTo({ top: this.cardC[k]*this.sh, behavior: 'smooth' });\n  }\n  toggleCard(k){\n    const opening = this.open !== k;\n    if(this.open >= 0) this.setDossier(this.open, false);\n    this.open = opening ? k : -1;\n    if(opening) this.setDossier(k, true);\n  }\n  setDossier(k, on){\n    const el = this.els.cards[k]; if(!el) return;\n    const d = el.querySelector('[data-dossier]');\n    const hint = el.querySelector('[data-hint]');\n    if(d){ d.style.maxHeight = on ? (d.scrollHeight + 8) + 'px' : '0px'; d.style.opacity = on ? '1' : '0'; }\n    if(hint) hint.textContent = on ? '— CLOSE DOSSIER' : '* DOSSIER';\n    el.setAttribute('aria-expanded', on ? 'true' : 'false');\n  }\n  buildWells(){\n    const N = this.N, M = this.M, X0 = -12, dX = 24/(N-1), Z0 = -8, dZ = 16/(M-1);\n    this.wells = this.nodes.map(n=>{\n      const arr = [];\n      for(let j=0;j<M;j++){\n        const z = Z0 + j*dZ;\n        for(let i=0;i<N;i++){\n          const x = X0 + i*dX;\n          const d2 = (x-n.x)*(x-n.x) + (z-n.z)*(z-n.z);\n          if(d2 < 9){ arr.push(j*N+i); arr.push(Math.exp(-d2/1.7)); }\n        }\n      }\n      return arr;\n    });\n  }\n  measure = () => {\n    const cv = this.cv; if(!cv) return;\n    this.W = window.innerWidth; this.H = Math.max(1, window.innerHeight);\n    this.mobile = this.W < 640;\n
